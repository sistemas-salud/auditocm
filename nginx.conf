server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html; 
    index index.html index.htm; 

    # 1. Intentar servir archivos estáticos (CSS, JS, imágenes)
    location ~* \.(css|js|gif|jpe?g|png|ico|woff|woff2|ttf|eot)$ {
        # Si el archivo estático existe en la carpeta /usr/share/nginx/html, lo sirve Nginx directamente.
        try_files $uri =404;
        # Esto mejora el rendimiento, ya que Nginx es más rápido sirviendo archivos estáticos que PHP/Apache.
    }

    # 2. Proxy para todas las demás peticiones (páginas, rutas de aplicación, API)
    location / {
        # Si el archivo ESTÁTICO existe en el frontend, lo sirve Nginx (por si hay un index.html).
        # Si NO existe, la petición se envía al BACKEND.
        try_files $uri $uri/ @backend; 
    }

    # 3. Bloque para reenviar peticiones al Backend (servidor PHP)
    location @backend {
        # Reenvía la petición al servicio 'backend' (que está en el puerto 80 del contenedor).
        # Docker Compose lo resuelve automáticamente.
        proxy_pass http://auditocm_backend:80; 

        # Configuraciones estándar de Proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bloquear acceso a archivos ocultos (ej: .git, .env)
    location ~ /\. {
        deny all;
    }
}