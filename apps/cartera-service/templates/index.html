<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Cartera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4 text-center">Sistema de Gestión de Cartera</h2>

    <div class="row">

        <!-- MODULO CARGUE -->
        <div class="col-md-6 mb-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title">Cargue Base de Datos</h5>
                    <hr>

                    <a href="/upload/migrantes" class="btn btn-primary w-100 mb-2">
                        BD Migrantes
                    </a>

                    <a href="/upload/urgencias" class="btn btn-primary w-100 mb-2">
                        BD Urgencias
                    </a>

                    <a href="/upload/nopos" class="btn btn-primary w-100">
                        BD NO POS
                    </a>
                </div>
            </div>
        </div>

        <!-- MODULO CARTERA -->
        <div class="col-md-6 mb-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title">Estado de Cartera</h5>
                    <hr>

                    <a href="/cartera?tipo=entidad" class="btn btn-success w-100 mb-2">
                        Por Entidad
                    </a>

                    <a href="/cartera?tipo=anio" class="btn btn-success w-100 mb-2">
                        Por Año
                    </a>

                    <a href="/cartera?tipo=general" class="btn btn-success w-100">
                        General
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
