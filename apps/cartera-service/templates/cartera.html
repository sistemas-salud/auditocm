<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Módulo Cartera</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .card {
            border-radius: 15px;
        }

        .table thead {
            background-color: #0d6efd;
            color: white;
        }

        .total-row {
            font-weight: bold;
            background-color: #e9ecef;
        }

        h3, h4, h5 {
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container-fluid mt-5 px-5">

    <!-- 🔹 FORMULARIO -->
    <div class="card shadow p-4 mb-4">
        <h3 class="mb-4">-Consulta de Cartera-</h3>

        <form id="formConsulta" class="row g-3">

            <!-- <div class="col-md-4">
                <label class="form-label">NIT</label>
                <input type="text" id="nit" class="form-control" required>
            </div> -->

            <div class="position-relative">
                <label>NIT</label>
                <input type="text" id="nit" class="form-control" autocomplete="off">
                <div id="nit-list" class="list-group position-absolute w-100" style="z-index:1000;"></div>
            </div>


            <div class="col-md-6">
                <label>Nombre IPS</label>
                <input type="text" id="nombre_ips" class="form-control" readonly>
            </div>


            <div class="col-md-4">
                <label class="form-label">Año</label>
                <input type="text" id="year" class="form-control"
                       placeholder="Ej: 2025 o * para todos">
            </div>

            <div class="col-md-4 position-relative">
                <label>Acta</label>
                <input type="text" id="acta" class="form-control" autocomplete="off">
                <div id="acta-list" class="list-group position-absolute w-100" style="z-index:1000;"></div>
            </div>

            <div class="col-md-4 position-relative">
                <label>No Factura</label>
                <input type="text" id="no_factura" name="no_factura" class="form-control" autocomplete="off">
                <div id="factura-list" class="list-group position-absolute w-100" style="z-index:1000;"></div>
            </div>

            <div class="col-md-4 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">
                    Consultar
                </button>
            </div>

        </form>
    </div>

    <!-- 🔹 CONTENIDO PRINCIPAL -->
    <div class="row">

        <!-- 🔹 TABLA PRINCIPAL -->
        <div class="col-md-9">
            <div class="card shadow p-4">
                <h4 class="mb-3">Detalle por Acta</h4>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover" id="tablaCartera">
                        <thead>
                            <tr>
                                <th>Acta</th>
                                <th>Valor Factura</th>
                                <th>Valor Glosado</th>
                                <th>Valor Reconocido</th>
                                <th>Valor Pagado</th>
                                <th>Saldo</th>
                                <th>Pasivo Contingente</th>
                                <th># Facturas</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                        <tfoot></tfoot>
                    </table>
                </div>

            </div>
        </div>

        <!-- 🔹 PANEL LATERAL -->
        <div class="col-md-3">
            <div class="card shadow p-4">
                <h5 class="mb-3">Resumen Global por Estado</h5>

                <table class="table table-sm table-bordered">
                    <thead class="table-light">
                        <tr>
                            <th>Estado</th>
                            <th>Valor</th>
                            <th>Cant.</th>
                        </tr>
                    </thead>
                    <tbody id="tablaResumen"></tbody>
                </table>

            </div>
        </div>

    </div>

</div>

<script>

document.getElementById("formConsulta").addEventListener("submit", function(e){
    e.preventDefault();

    // 🔥submit
    const nit = document.getElementById("nit").value.trim();
    const year = document.getElementById("year").value.trim();
    const acta = document.getElementById("acta").value.trim();
    const no_factura = document.getElementById("no_factura").value.trim();

    if (!nit && !acta && !no_factura) {
        alert("Debe ingresar al menos un filtro");
        return;
    }

    // 🔥 Construir parámetros dinámicamente
    const params = new URLSearchParams();

    if (nit) params.append("nit", nit);
    if (year) params.append("year", year);
    if (acta) params.append("acta", acta);
    if (no_factura) params.append("no_factura", no_factura);

    // 🔹 Consulta principal
    fetch(`/cartera/acta?${params.toString()}`)
        .then(response => response.json())
        .then(data => {
            if(data.status === "success"){
                renderTable(data.data);
            } else {
                alert(data.message);
            }
        });

    // 🔹 Consulta resumen lateral
    fetch(`/cartera/resumen?${params.toString()}`)
        .then(response => response.json())
        .then(data => {
            if(data.status === "success"){
                renderResumen(data.data);
            }
        });
});


function formatCurrency(value){
    return new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        minimumFractionDigits: 0
    }).format(value);
}


function renderTable(data){

    const tbody = document.querySelector("#tablaCartera tbody");
    const tfoot = document.querySelector("#tablaCartera tfoot");

    tbody.innerHTML = "";
    tfoot.innerHTML = "";

    let totalFactura = 0;
    let totalGlosado = 0;
    let totalReconocido = 0;
    let totalPagado = 0;
    let totalSaldo = 0;
    let totalPasivo = 0;
    let totalFacturas = 0;

    data.forEach(row => {

        totalFactura += Number(row.SUMA_VALOR_FACTURA || 0);
        totalGlosado += Number(row.SUMA_DE_VALOR_GLOSADO || 0);
        totalReconocido += Number(row.SUMA_DE_VALOR_RECONOCIDO || 0);
        totalPagado += Number(row.SUMA_DE_VALOR_PAGADO || 0);
        totalSaldo += Number(row.SUMA_DE_VALOR_SALDO || 0);
        totalPasivo += Number(row.SUMA_DE_PASIVO_CONTINGENTE || 0);
        totalFacturas += Number(row.CUENTA_No_FACTURA || 0);

        tbody.innerHTML += `
        <tr>
            <td>${row.acta}</td>
            <td>${formatCurrency(row.SUMA_VALOR_FACTURA)}</td>
            <td>${formatCurrency(row.SUMA_DE_VALOR_GLOSADO)}</td>
            <td>${formatCurrency(row.SUMA_DE_VALOR_RECONOCIDO)}</td>
            <td>${formatCurrency(row.SUMA_DE_VALOR_PAGADO)}</td>
            <td>${formatCurrency(row.SUMA_DE_VALOR_SALDO)}</td>
            <td>${formatCurrency(row.SUMA_DE_PASIVO_CONTINGENTE)}</td>
            <td>${row.CUENTA_No_FACTURA}</td>
            <td class="text-center">
                <button class="btn btn-sm btn-outline-primary"
                        onclick="verDetalle('${row.acta}')">
                    👁
                </button>
            </td>
        </tr>
        `;
    });

    tfoot.innerHTML = `
        <tr class="total-row">
            <td>TOTALES</td>
            <td>${formatCurrency(totalFactura)}</td>
            <td>${formatCurrency(totalGlosado)}</td>
            <td>${formatCurrency(totalReconocido)}</td>
            <td>${formatCurrency(totalPagado)}</td>
            <td>${formatCurrency(totalSaldo)}</td>
            <td>${formatCurrency(totalPasivo)}</td>
            <td>${totalFacturas}</td>
            <td></td>
        </tr>
    `;
}

function renderResumen(data){

    const tbody = document.getElementById("tablaResumen");
    tbody.innerHTML = "";

    let totalValor = 0;
    let totalCantidad = 0;

    data.forEach(row => {

        totalValor += Number(row.total_valor || 0);
        totalCantidad += Number(row.total_cantidad || 0);

        tbody.innerHTML += `
            <tr>
                <td>${row.estado}</td>
                <td>${formatCurrency(row.total_valor)}</td>
                <td>${row.total_cantidad}</td>
            </tr>
        `;
    });

    tbody.innerHTML += `
        <tr class="fw-bold table-secondary">
            <td>TOTAL</td>
            <td>${formatCurrency(totalValor)}</td>
            <td>${totalCantidad}</td>
        </tr>
    `;
}


function verDetalle(acta) {

    fetch(`/cartera/detalle?acta=${acta}`)
        .then(response => response.json())
        .then(data => {

            if(data.status === "success"){

                let tbody = document.querySelector("#tablaDetalle tbody");
                tbody.innerHTML = "";

                data.data.forEach(row => {

                    let tr = document.createElement("tr");

                    tr.innerHTML = `
                        <td>${row.NO_FACTURA}</td>
                        <td>${row.NIT}</td>
                        <td>${row.IPS}</td>
                        <td>${row.VALOR_FACTURA}</td>
                        <td>${row.VALOR_GLOSADO}</td>
                        <td>${row.VALOR_RECONOCIDO}</td>
                        <td>${row.VALOR_PAGADO}</td>
                        <td>${row.VALOR_SALDO}</td>
                    `;

                    tbody.appendChild(tr);
                });

                let modal = new bootstrap.Modal(document.getElementById('modalDetalle'));
                modal.show();
            }
        });
}


// 
const nitInput = document.getElementById("nit");
const nitList = document.getElementById("nit-list");
const nombreInput = document.getElementById("nombre_ips");

nitInput.addEventListener("input", function() {

    let query = this.value;

    if (query.length < 2) {
        nitList.innerHTML = "";
        nombreInput.value = "";
        return;
    }

    fetch(`/autocomplete_nit?term=${query}`)
        .then(response => response.json())
        .then(data => {

            nitList.innerHTML = "";

            data.forEach(item => {

                let option = document.createElement("a");
                option.classList.add("list-group-item", "list-group-item-action");

                // mostramos nit + nombre en la lista
                option.textContent = item.nit + " - " + item.nombre;

                option.addEventListener("click", function() {
                    nitInput.value = item.nit;
                    nombreInput.value = item.nombre;
                    nitList.innerHTML = "";
                });

                nitList.appendChild(option);
            });
        });
});

// FILTRO PARA BUSQUEDA POR ACTA
const actaInput = document.getElementById("acta");
const actaList = document.getElementById("acta-list");

actaInput.addEventListener("input", function() {

    let query = this.value;

    if (query.length < 2) {
        actaList.innerHTML = "";
        return;
    }

    fetch(`/autocomplete_acta?term=${query}`)
        .then(response => response.json())
        .then(data => {

            actaList.innerHTML = "";

            data.forEach(item => {

                let option = document.createElement("a");
                option.classList.add("list-group-item", "list-group-item-action");
                option.textContent = item.acta;

                option.addEventListener("click", function() {
                    actaInput.value = item.acta;
                    actaList.innerHTML = "";
                });

                actaList.appendChild(option);
            });
        });
});

// cerrar si se hace click afuera
document.addEventListener("click", function(e) {
    if (!actaInput.contains(e.target)) {
        actaList.innerHTML = "";
    }
});

// FILTRO PARA BUSQUEDA POR NO_FACTURA
const facturaInput = document.getElementById("no_factura");
const facturaList = document.getElementById("factura-list");

facturaInput.addEventListener("input", function() {

    let query = this.value;

    if (query.length < 2) {
        facturaList.innerHTML = "";
        return;
    }

    fetch(`/autocomplete_factura?term=${query}`)
        .then(response => response.json())
        .then(data => {

            facturaList.innerHTML = "";

            data.forEach(item => {

                let option = document.createElement("a");
                option.classList.add("list-group-item", "list-group-item-action");
                option.textContent = item.no_factura;

                option.addEventListener("click", function() {
                    facturaInput.value = item.no_factura;
                    facturaList.innerHTML = "";
                });

                facturaList.appendChild(option);
            });
        });
});
</script>


<div class="modal fade" id="modalDetalle" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Detalle de Facturas</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <table class="table table-bordered" id="tablaDetalle">
          <thead>
            <tr>
              <th>No Factura</th>
              <th>NIT</th>
              <th>IPS</th>
              <th>Valor Factura</th>
              <th>Valor Glosado</th>
              <th>Valor Reconocido</th>
              <th>Valor Pagado</th>
              <th>Valor Saldo</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

      </div>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
